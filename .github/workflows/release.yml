name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15  # ARM64 guaranteed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Quality gates
        run: |
          bun run lint
          bun run test -- --passWithNoTests
          bun run format -- --check --no-error-on-unmatched-pattern

      - name: Build binary
        run: |
          mkdir -p dist
          bun run scripts/compile.ts

      - name: Build notification helper
        run: bash src/notify-helper/build.sh

      - name: Package notification helper
        run: |
          cd dist
          tar -czf tawtui-notify-darwin-arm64.tar.gz "TaWTUI Notify.app"

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 tawtui-darwin-arm64 > tawtui-darwin-arm64.sha256
          shasum -a 256 tawtui-notify-darwin-arm64.tar.gz > tawtui-notify-darwin-arm64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tawtui-darwin-arm64
            dist/tawtui-darwin-arm64.sha256
            dist/tawtui-notify-darwin-arm64.tar.gz
            dist/tawtui-notify-darwin-arm64.tar.gz.sha256

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: victorstein/homebrew-tap
          event-type: update-formula
          client-payload: '{"tag": "${{ github.ref_name }}"}'
